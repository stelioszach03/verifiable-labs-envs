name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install monorepo + API + SDK + vlabs-calibrate + vlabs-api + vlabs-audit
        run: |
          python -m pip install --upgrade pip
          # Monorepo with dev + api extras (api required for the SDK
          # integration test that spins up uvicorn).
          pip install -e ".[dev,api]"
          # Editable SDK so packages/verifiable-labs/tests are runnable.
          pip install -e packages/verifiable-labs
          # Editable calibrate so packages/vlabs-calibrate/tests are runnable.
          pip install -e packages/vlabs-calibrate
          # Editable hosted API so services/api/tests are runnable.
          # The dev extra brings in pgserver, which downloads its own
          # self-contained Postgres binary on first run.
          pip install -e "services/api[dev]"
          # Editable audit tool so tools/vlabs-audit/tests are runnable.
          pip install -e "tools/vlabs-audit[dev]"

      - name: Install tectonic (Linux only — vlabs-audit LaTeX integration)
        if: runner.os == 'Linux'
        run: |
          # Prebuilt static binary, no Rust toolchain or full TeX Live needed.
          # Tests gracefully skip the real-tectonic path on macOS where the
          # binary isn't installed; figure + escape unit tests stay covered.
          TECTONIC_VERSION="0.15.0"
          curl --proto '=https' --tlsv1.2 -fsSL \
            "https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic@${TECTONIC_VERSION}/tectonic-${TECTONIC_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | sudo tar -xz -C /usr/local/bin/
          tectonic --version

      - name: Lint with ruff
        run: |
          ruff check src tests benchmarks examples scripts \
                     packages/verifiable-labs/src packages/verifiable-labs/tests \
                     packages/vlabs-calibrate/src packages/vlabs-calibrate/tests \
                     services/api/src services/api/tests \
                     tools/vlabs-audit/src tools/vlabs-audit/tests

      - name: Run tests
        run: pytest

  build:
    name: build wheels
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - name: Build monorepo wheel
        run: python -m build --outdir dist/
      - name: Build SDK wheel
        run: python -m build --outdir dist/ packages/verifiable-labs
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
