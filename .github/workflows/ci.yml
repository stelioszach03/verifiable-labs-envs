name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install monorepo + API + SDK
        run: |
          python -m pip install --upgrade pip
          # Monorepo with dev + api extras (api required for the SDK
          # integration test that spins up uvicorn).
          pip install -e ".[dev,api]"
          # Editable SDK so packages/verifiable-labs/tests are runnable.
          pip install -e packages/verifiable-labs

      - name: Lint with ruff
        run: |
          ruff check src tests benchmarks examples scripts \
                     packages/verifiable-labs/src packages/verifiable-labs/tests

      - name: Run tests
        run: pytest

  build:
    name: build wheels
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - name: Build monorepo wheel
        run: python -m build --outdir dist/
      - name: Build SDK wheel
        run: python -m build --outdir dist/ packages/verifiable-labs
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
