[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "verifiable-labs"
version = "0.1.0a3"
description = "Python SDK + CLI for Verifiable Labs — evaluate frontier LLMs on conformal-calibrated scientific RL environments."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [
    { name = "Stelios Zacharioudakis", email = "stelios@stelioszach.com" },
]
keywords = [
    "reinforcement-learning",
    "rlvr",
    "scientific-ml",
    "inverse-problems",
    "conformal-prediction",
    "llm-evaluation",
    "verifiable-labs",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    "typing-extensions>=4.8",
    # CLI surface — pulls in env code so `verifiable run --env X --model Y`
    # actually executes locally. Heavy (numpy / scipy / jax) but unavoidable
    # without a hosted API.
    "verifiable-labs-envs>=0.1.0a1",
    # Provider client used by --model (Anthropic / OpenAI / Google all expose
    # OpenAI-compatible endpoints).
    "openai>=1.50",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
    "ruff>=0.5",
]

[project.scripts]
# User-facing CLI: `verifiable list`, `verifiable run --env X --model Y`,
# `verifiable info --env X`, `verifiable login`. For dev/legacy commands
# (envs / compare / report / init-env / validate-env, or
# `run --agent FILE --out F.jsonl`) this CLI delegates to
# verifiable_labs_envs.cli.main, so the underlying developer surface keeps
# working unchanged.
verifiable = "verifiable_labs.cli:main"

[project.urls]
Homepage = "https://verifiable-labs.com"
Source = "https://github.com/stelioszach03/verifiable-labs-envs/tree/main/packages/verifiable-labs"
Issues = "https://github.com/stelioszach03/verifiable-labs-envs/issues"
Documentation = "https://verifiable-labs.com/docs/"

[tool.hatch.build.targets.wheel]
packages = ["src/verifiable_labs"]

[tool.hatch.build.targets.sdist]
include = ["src/", "tests/", "README.md", "CHANGELOG.md", "LICENSE", "pyproject.toml"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: spins up a real uvicorn instance; needs the API package installed",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]
