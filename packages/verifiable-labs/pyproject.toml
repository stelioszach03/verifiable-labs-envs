[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "verifiable-labs"
version = "0.1.0a1"
description = "Python SDK for the Verifiable Labs Hosted Evaluation API — evaluate frontier LLMs on conformal-calibrated scientific RL environments."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [
    { name = "Stelios Zacharioudakis", email = "stelios@stelioszach.com" },
]
keywords = [
    "reinforcement-learning",
    "rlvr",
    "scientific-ml",
    "inverse-problems",
    "conformal-prediction",
    "llm-evaluation",
    "verifiable-labs",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    "typing-extensions>=4.8",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
    "ruff>=0.5",
]

[project.urls]
Homepage = "https://github.com/stelioszach03/verifiable-labs-envs"
Source = "https://github.com/stelioszach03/verifiable-labs-envs/tree/main/packages/verifiable-labs"
Issues = "https://github.com/stelioszach03/verifiable-labs-envs/issues"
Documentation = "https://github.com/stelioszach03/verifiable-labs-envs/blob/main/packages/verifiable-labs/README.md"
"API reference" = "https://github.com/stelioszach03/verifiable-labs-envs/blob/main/deploy/api/README.md"

[tool.hatch.build.targets.wheel]
packages = ["src/verifiable_labs"]

[tool.hatch.build.targets.sdist]
include = ["src/", "tests/", "README.md", "CHANGELOG.md", "LICENSE", "pyproject.toml"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: spins up a real uvicorn instance; needs the API package installed",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]
